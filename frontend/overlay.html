<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MultiDanmaku</title>
  <style>
    :root {
      --font: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', system-ui, sans-serif;
      --msg-lifetime: 10s;
    }

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #0f0f0f;
      font-family: var(--font);
      overflow: hidden;
      user-select: none;
    }

    body {
      display: flex; flex-direction: column;
    }

    /* ---- Drag handle (top bar) ---- */
    #top-bar {
      height: 6px;
      flex-shrink: 0;
      background: linear-gradient(90deg, #00a1d6, #fe2c55, #ff6600);
      opacity: 0;
      transition: opacity 0.3s;
      cursor: grab;
    }
    #top-bar:hover { opacity: 0.6; }

    /* ---- Chat area ---- */
    #chat-area {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column-reverse;
      gap: 4px;
      padding: 8px 10px;
      scrollbar-width: none;
      background: transparent;
    }
    #chat-area::-webkit-scrollbar { display: none; }

    /* ---- Single message ---- */
    .msg {
      display: flex;
      align-items: flex-start;
      gap: 7px;
      animation: msg-in 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) 1,
                 msg-fade var(--msg-lifetime) ease-in forwards;
      transform-origin: left center;
      width: fit-content;
      max-width: 95%;
    }

    .msg .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: rgba(58,58,74,0.8); flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; color: #888;
      overflow: hidden;
    }
    .msg .avatar img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

    .msg .bubble {
      display: flex; flex-direction: column; gap: 1px;
      padding: 5px 12px;
      border-radius: 14px;
      min-width: 2em; width: fit-content;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #e0e0e0;
    }

    .msg .meta {
      display: flex; align-items: center; gap: 5px; flex-wrap: wrap;
    }
    .msg .badge {
      padding: 1px 5px; border-radius: 3px;
      font-size: 9px; font-weight: 600; color: #fff;
      white-space: nowrap;
    }
    .msg .event-type {
      padding: 1px 4px; border-radius: 3px;
      font-size: 8px; font-weight: 600;
      letter-spacing: 0.4px; text-transform: uppercase;
      background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.6);
    }
    .msg .username {
      font-size: 11px; font-weight: 600;
      color: rgba(255,255,255,0.7);
    }
    .msg .content {
      font-size: 13px; font-weight: 500; line-height: 1.4;
      word-break: break-word;
    }
    .msg .timestamp {
      font-size: 9px; opacity: 0.3;
      margin-left: auto; padding-left: 6px;
      flex-shrink: 0; align-self: center;
    }

    /* ---- Animations ---- */
    @keyframes msg-in {
      from { opacity: 0; transform: scale(0.7) translateY(6px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    @keyframes msg-fade {
      0%, 70% { opacity: 1; }
      100%    { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="top-bar"></div>
  <div id="chat-area"></div>

  <script>
    var PLATFORM_DEFAULTS = {
      bilibili: { label: "B站", color: "#00a1d6" },
      douyin:   { label: "抖音", color: "#fe2c55" },
      kuaishou: { label: "快手", color: "#ff6600" },
    };

    var chatArea = document.getElementById("chat-area");
    var config = null;
    var MSG_LIFETIME = 10000; // ms, matches --msg-lifetime

    function loadConfig() {
      fetch("/api/config").then(function(r) { return r.json(); }).then(function(c) {
        config = c;
      }).catch(function() {});
    }

    function getDisplay(platform) {
      var def = PLATFORM_DEFAULTS[platform] || { label: platform, color: "#999" };
      if (config && config[platform] && config[platform].display) {
        var d = config[platform].display;
        return {
          visible: d.visible !== false,
          label: d.label || def.label,
          color: d.color || def.color,
          icon_url: d.icon_url || "",
        };
      }
      return { visible: true, label: def.label, color: def.color, icon_url: "" };
    }

    function esc(s) { var d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }
    function escA(s) { return (s || "").replace(/&/g,"&amp;").replace(/"/g,"&quot;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
    function pad(n) { return n < 10 ? "0" + n : "" + n; }
    function proxyAvatar(url) {
      if (url && url.indexOf("hdslb.com") >= 0) return "/api/avatar?url=" + encodeURIComponent(url);
      return url;
    }

    function appendMessage(ev) {
      var pd = getDisplay(ev.platform);
      if (!pd.visible) return;

      if (config) {
        var d = config.display;
        if (d.blacklist_users && d.blacklist_users.indexOf(ev.username) >= 0) return;
        if (d.min_content_length > 0 && ev.content.length < d.min_content_length) return;
        if (d.filter_keywords && d.filter_keywords.length > 0) {
          var lower = ev.content.toLowerCase();
          var blocked = false;
          for (var i = 0; i < d.filter_keywords.length; i++) {
            if (lower.indexOf(d.filter_keywords[i].toLowerCase()) >= 0) { blocked = true; break; }
          }
          if (blocked) return;
        }
      }

      var div = document.createElement("div");
      div.className = "msg";

      var avHtml;
      if (ev.avatar) {
        avHtml = '<span class="avatar"><img src="' + escA(proxyAvatar(ev.avatar)) + '" alt="" /></span>';
      } else {
        var ch = ev.username ? ev.username.charAt(0).toUpperCase() : "?";
        avHtml = '<span class="avatar">' + esc(ch) + '</span>';
      }

      var metaParts = [];
      if (!config || config.display.show_platform_badge !== false) {
        if (pd.icon_url) {
          metaParts.push('<span class="badge" style="background:' + escA(pd.color) + '"><img src="' + escA(pd.icon_url) + '" style="height:10px;vertical-align:middle" /></span>');
        } else {
          metaParts.push('<span class="badge" style="background:' + escA(pd.color) + '">' + esc(pd.label) + '</span>');
        }
      }
      if (ev.event_type !== "danmaku") {
        var tl = { gift: "礼物", enter: "进入", like: "点赞", follow: "关注", system: "系统" };
        metaParts.push('<span class="event-type">' + (tl[ev.event_type] || ev.event_type) + '</span>');
      }
      metaParts.push('<span class="username">' + esc(ev.username) + '</span>');

      var tsHtml = "";
      if (config && config.display.show_timestamp) {
        var dt = new Date(ev.timestamp * 1000);
        tsHtml = '<span class="timestamp">' + pad(dt.getHours()) + ':' + pad(dt.getMinutes()) + '</span>';
      }

      div.innerHTML =
        avHtml +
        '<div class="bubble">' +
          '<div class="meta">' + metaParts.join("") + '</div>' +
          '<div class="content">' + esc(ev.content) + '</div>' +
        '</div>' +
        tsHtml;

      chatArea.appendChild(div);

      // Auto-remove after lifetime
      setTimeout(function() {
        if (div.parentNode) div.parentNode.removeChild(div);
      }, MSG_LIFETIME);

      var max = 200;
      while (chatArea.children.length > max) {
        chatArea.removeChild(chatArea.children[0]);
      }
    }

    function connect() {
      var proto = location.protocol === "https:" ? "wss" : "ws";
      var ws = new WebSocket(proto + "://" + location.host + "/ws");
      ws.onmessage = function(e) {
        try { appendMessage(JSON.parse(e.data)); } catch(ex) {}
      };
      ws.onclose = function() { setTimeout(connect, 2000); };
      ws.onerror = function() { ws.close(); };
    }

    loadConfig();
    connect();
    setInterval(loadConfig, 30000);
  </script>
</body>
</html>
